name: Build PS5 Payload

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang lld llvm make wget unzip python3 python3-pyelftools gcc-multilib g++-multilib

    - name: Create toolchain symlinks
      run: |
        sudo ln -sf /usr/bin/clang /usr/local/bin/x86_64-prospero-elf-gcc
        sudo ln -sf /usr/bin/ld.lld /usr/local/bin/x86_64-prospero-elf-ld
        sudo ln -sf /usr/bin/llvm-objcopy /usr/local/bin/x86_64-prospero-elf-objcopy
        sudo ln -sf /usr/bin/llvm-ar /usr/local/bin/x86_64-prospero-elf-ar

    - name: Download and install PS5 Payload SDK
      run: |
        wget https://github.com/ps5-payload-dev/sdk/releases/latest/latest/download/ps5-payload-sdk.zip || wget https://github.com/ps5-payload-dev/sdk/releases/download/v0.1/ps5-payload-sdk.zip || wget https://github.com/ps5-payload-dev/sdk/releases/latest/download/ps5-payload-sdk.zip
        sudo unzip -d /opt ps5-payload-sdk.zip || true
        mkdir -p ../ps5-payload-sdk
        ln -s /opt/ps5-payload-sdk ../ps5-payload-sdk/install

    - name: Build payload
      env:
        PS5_PAYLOAD_SDK: /opt/ps5-payload-sdk
      run: |
        make

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Control-Power-PS5-Bin
        path: "*.bin"
