name: Build PS5 Payload

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang lld llvm make wget unzip python3 python3-pyelftools gcc-multilib g++-multilib

    - name: Create toolchain symlinks
      run: |
        sudo ln -sf /usr/bin/clang /usr/local/bin/x86_64-prospero-elf-gcc
        sudo ln -sf /usr/bin/ld.lld /usr/local/bin/x86_64-prospero-elf-ld
        sudo ln -sf /usr/bin/llvm-objcopy /usr/local/bin/x86_64-prospero-elf-objcopy
        sudo ln -sf /usr/bin/llvm-ar /usr/local/bin/x86_64-prospero-elf-ar

    - name: Download and install PS5 Payload SDK
      run: |
        # تحميل الملف
        wget -q https://github.com/ps5-payload-dev/sdk/releases/latest/download/ps5-payload-sdk.zip || wget -q https://github.com/ps5-payload-dev/sdk/releases/download/v0.1/ps5-payload-sdk.zip
        
        # فك الضغط في مجلد مؤقت للتحقق من الهيكلية
        mkdir -p /tmp/sdk-extract
        unzip -q ps5-payload-sdk.zip -d /tmp/sdk-extract
        
        # إنشاء المجلد الصحيح الذي يطلبه الـ Makefile
        mkdir -p ../ps5-payload-sdk/install
        
        # نسخ الملفات بشكل صحيح سواء كانت داخل مجلد فرعي أو مباشرة
        if [ -d "/tmp/sdk-extract/ps5-payload-sdk" ]; then
          cp -r /tmp/sdk-extract/ps5-payload-sdk/* ../ps5-payload-sdk/install/
        else
          cp -r /tmp/sdk-extract/* ../ps5-payload-sdk/install/
        fi

    - name: Build payload
      run: |
        make

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Control-Power-PS5-Bin
        path: "*.bin"
