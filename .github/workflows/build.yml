name: Build PS5 Payload

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y clang lld llvm make wget unzip python3 python3-pyelftools gcc-multilib g++-multilib

    - name: Create smart toolchain wrappers
      run: |
        # بناء مجمع ذكي يفصل بين مرحلة التجميع ومرحلة الربط الخاصة بالـ كونسول
        sudo tee /usr/local/bin/x86_64-prospero-elf-gcc << 'EOF'
        #!/bin/bash
        if [[ " $* " == *" -c "* ]]; then
          exec clang -target x86_64-pc-freebsd "$@"
        else
          exec clang -target x86_64-pc-freebsd -fuse-ld=lld -nostdlib "$@"
        fi
        EOF
        sudo chmod +x /usr/local/bin/x86_64-prospero-elf-gcc
        
        # الروابط المساعدة للأدوات الأخرى
        sudo ln -sf /usr/bin/ld.lld /usr/local/bin/x86_64-prospero-elf-ld
        sudo ln -sf /usr/bin/llvm-objcopy /usr/local/bin/x86_64-prospero-elf-objcopy
        sudo ln -sf /usr/bin/llvm-ar /usr/local/bin/x86_64-prospero-elf-ar

    - name: Download and install PS5 Payload SDK
      run: |
        mkdir -p /tmp/sdk-extract
        mkdir -p ../ps5-payload-sdk/install
        
        echo "=== Downloading SDK ==="
        if wget -q https://github.com/ps5-payload-dev/sdk/releases/latest/download/ps5-payload-sdk.zip -O /tmp/sdk.zip; then
          unzip -q /tmp/sdk.zip -d /tmp/sdk-extract
        else
          wget -q https://github.com/ps5-payload-dev/sdk/releases/download/v0.1/ps5-payload-sdk.zip -O /tmp/sdk.zip
          unzip -q /tmp/sdk.zip -d /tmp/sdk-extract
        fi
        
        echo "=== Mapping SDK Elements Correctly ==="
        TOOLCHAIN_DIR=$(find /tmp/sdk-extract -name "toolchain" -type d | head -n 1)
        if [ ! -z "$TOOLCHAIN_DIR" ]; then
          cp -r "$TOOLCHAIN_DIR" ../ps5-payload-sdk/install/
        fi
        
        INCLUDE_DIR=$(find /tmp/sdk-extract -name "include" -type d | head -n 1)
        if [ ! -z "$INCLUDE_DIR" ]; then
          mkdir -p ../ps5-payload-sdk/install/include
          cp -r "$INCLUDE_DIR"/* ../ps5-payload-sdk/install/include/
        fi
        
        LIB_DIR=$(find /tmp/sdk-extract -name "lib" -type d | head -n 1)
        if [ ! -z "$LIB_DIR" ]; then
          cp -r "$LIB_DIR" ../ps5-payload-sdk/install/
        fi
        
        cat << 'EOT' > ../ps5-payload-sdk/install/include/kernel.h
        #ifndef PS5_POWER_KERNEL_H
        #define PS5_POWER_KERNEL_H

        #include <sys/types.h>

        int sceKernelShutdownSystem(void);
        int sceKernelReboot(void);
        int sceKernelSuspendSystem(void);

        #endif
        EOT

    - name: Build payload
      run: |
        make

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Control-Power-PS5-Bin
        path: "*.bin"
